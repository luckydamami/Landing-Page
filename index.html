<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Header/Navbar -->
    <header>
      <nav class="navbar section-content">
        <a href="#" class="nav-logo">
          <img src="images/Coffee-logo.png" alt="" />
          <h2 class="logo-text">Coffee</h2>
        </a>
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="#home" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="#about" class="nav-link">About</a>
          </li>
          <li class="nav-item">
            <a href="#services" class="nav-link">Services</a>
          </li>
          <li class="nav-item">
            <a href="#contact" class="nav-link">Contact</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- Hero Section -->
    <main>
      <section class="hero-section">
        <div class="section-content">
          <div class="hero-details">
            <h2 class="title">Best Coffee</h2>
            <h3 class="subtitle">
              Make your day great with our special coffee!
            </h3>
            <p class="description">
              Welcome to our Coffee paradise, where every bean tells a story and
              every cup sparks joy.
            </p>
            <div class="buttons">
              <a href="#ordernow" class="button order-now">Order Now</a>
              <a href="#contact" class="button contact">Contact Us</a>
            </div>
          </div>
          <div class="hero-image-wrapper">
            <img
              src="images/coffee-hero-section.jpg"
              alt="Hero"
              class="hero-image"
            />
          </div>
        </div>
      </section>
    </main>
  </body>
  <script src="js/script.js"></script>
</html>
